name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Minimal release workflow: publishes a GitHub Release with auto-generated
# notes plus the default source archives. No pre-built binaries — the app
# isn't code-signed / notarized, and distributing unsigned macOS apps would
# fail for most users due to Gatekeeper. Install path is clone + swift build.

jobs:
  verify:
    name: Verify builds
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Swift release build (sanity check)
        working-directory: app
        run: swift build -c release

      - name: MCP typecheck
        working-directory: mcp
        run: |
          npm ci
          npx tsc --noEmit

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
